services:
  postgres:
    image: postgres:16-alpine
    container_name: second-brain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: second_brain
    ports:
      - "5432:5432"
    volumes:
      - second_brain_postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d second_brain"]
      interval: 5s
      timeout: 5s
      retries: 12

  questdb:
    image: questdb/questdb:9.3.5
    container_name: showmeedge-questdb
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    volumes:
      - showmeedge_questdb_data:/var/lib/questdb

  market-api:
    build:
      context: ../services/market-api
    container_name: showmeedge-market-api
    restart: unless-stopped
    environment:
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      QUESTDB_HOST: questdb
      QUESTDB_PG_PORT: 8812
      QUESTDB_USER: admin
      QUESTDB_PASSWORD: quest
      QUESTDB_DATABASE: qdb
    ports:
      - "8000:8000"
    depends_on:
      - questdb

volumes:
  second_brain_postgres_data:
  showmeedge_questdb_data:
