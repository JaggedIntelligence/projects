services:
  postgres:
    image: postgres:16-alpine
    container_name: second-brain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: second_brain
    ports:
      - "5432:5432"
    volumes:
      - second_brain_postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d second_brain"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  second_brain_postgres_data:
